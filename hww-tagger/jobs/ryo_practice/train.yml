apiVersion: batch/v1
kind: Job
metadata:
  name: particletransformer-train
spec:
  template:
    spec:
      volumes:
        - name: workspace
          emptyDir: {}

        # ❗ Persistent storage for dataset
        - name: data
          persistentVolumeClaim:
            claimName: particletransformer-pvc

        # keep runtime logs ephemeral (optional)
        - name: run
          emptyDir: {}

      initContainers:
        - name: clone-pt
          image: alpine/git
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eux
              git clone https://github.com/jet-universe/particle_transformer /workspace/pt
              ls -lah /workspace/pt
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "100m"
              memory: "128Mi"
          volumeMounts:
            - name: workspace
              mountPath: /workspace

      containers:
        - name: main
          image: gitlab-registry.nrp-nautilus.io/jmduarte/hbb_interaction_network:latest
          command: ["/bin/bash", "-c"]
          args:
            - |
              pip install weaver-core

              cd /workspace/pt

              # IMPORTANT: dataset now lives on persistent volume
              export DATADIR_JetClass=/data/JetClass

              if [ ! -d "$DATADIR_JetClass/Pythia/train_100M" ]; then
                echo "Downloading JetClass..."
                python get_datasets.py JetClass -d /data
              else
                echo "Dataset already exists, skipping download"
              fi

              echo "Checking dataset..."
              ls $DATADIR_JetClass/Pythia/train_100M | head

              mkdir -p /workspace/run/logs /workspace/run/training

              ln -sf /workspace/run/logs logs
              ln -sf /workspace/run/training training

              ./train_JetClass.sh ParT full

          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: run
              mountPath: /workspace/run
            - name: data
              mountPath: /data

          resources:
            limits:
              memory: 38Gi
              cpu: "2"
              nvidia.com/gpu: "1"
            requests:
              memory: 32Gi
              cpu: "2"
              nvidia.com/gpu: "1"

      restartPolicy: Never
  backoffLimit: 0