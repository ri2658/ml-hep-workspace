apiVersion: batch/v1
kind: Job
metadata:
  name: weaver-job-rk-pyg
  labels:
    app: weavertagger
spec:
  template:
    spec:
      containers:
      - name: container
        image: gitlab-registry.nrp-nautilus.io/raghsthebest/hww-tagger/weaver
        command:
        - "/bin/bash"
        - "-c"
        - >
          git clone https://github.com/rkansal47/weaver &&
          cd weaver &&
          mkdir -p /hwwtaggervol/models/rk/8_11_pyg_2 &&
          (python -u train.py
          --data-train '/hwwtaggervol/training/ak15_Jul27/train/QCD*/*.root'
          '/hwwtaggervol/training/ak15_Jul27/train/Grav*/*.root'
          --data-config data/cm/ak15_4q3q_flat_eta_genHm_pt300.yaml
          --network-config networks/particle_net_pf_sv_4_layers_pyg.py
          --model-prefix /hwwtaggervol/models/rk/8_11_pyg_2/pyg_2
          --num-workers 2
          --batch-size 256
          --num-epochs 32
          --start-lr 3e-3
          --optimizer ranger
          --gpu "0,1"
          --fetch-step 0.02
          | tee /hwwtaggervol/logs/8_11_pyg_2.txt &
          wait)
        volumeMounts:
        - mountPath: /hwwtaggervol
          name: hwwtaggervol
        resources:
          limits:
            memory: 256Gi
            cpu: "4"
            nvidia.com/gpu: "2"
          requests:
            memory: 48Gi
            cpu: "3"
            nvidia.com/gpu: "2"
      volumes:
      - name: hwwtaggervol
        persistentVolumeClaim:
          claimName: hwwtaggervol
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: gpu-type
                operator: In
                values:
                - "1080"
                - 1080Ti
                - 2080Ti
      restartPolicy: Never
  backoffLimit: 0
