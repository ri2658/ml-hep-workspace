apiVersion: batch/v1
kind: Job
metadata:
  name: mqhwwinference-ak8-12jul-1lepvttbarwjets-lepprongs-pt300to400
  labels:
    app: weavertagger
spec:
  template:
    spec:
      containers:
      - name: container
        image: gitlab-registry.nrp-nautilus.io/raghsthebest/hww-tagger:latest
        command:
        - "/bin/bash"
        - "-c"
        - >
          git -C /hwwtaggervol/melissa-weaver pull &&
          mkdir -p /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400 &&
          mkdir -p /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400 &&
          mkdir -p /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/wjets &&
          mkdir -p /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/ttbar &&
          mkdir -p /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/ttbarwjets &&
          mkdir -p /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/qcd &&
          cd /opt/repo/weaver &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/ttbar.root
          --data-test "/hwwtaggervol/training/ak8_May30/test//TTTo*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_ttbarwjets_lepprongs.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/03_05_ak8_ttbarwjets-lepprongs/03_05_ak8_ttbarwjets-lepprongs_best_epoch_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/log_ttbar.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/wjets.root
          --data-test "/hwwtaggervol/training/ak8_May30/test//WJetsTo*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_ttbarwjets_lepprongs.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/03_05_ak8_ttbarwjets-lepprongs/03_05_ak8_ttbarwjets-lepprongs_best_epoch_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/log_wjets.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/bulkg.root
          --data-test '/hwwtaggervol/training/ak8_May30/test/Bulk*/*.root'
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_ttbarwjets_lepprongs.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/03_05_ak8_ttbarwjets-lepprongs/03_05_ak8_ttbarwjets-lepprongs_best_epoch_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/log_bulkg.txt) && 
          pip install coffea mplhep --upgrade &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/hwwlnuqq.root
          --data-test '/hwwtaggervol/training/ak8_May30/test/GluGluHToWWToLNuQQ*/*.root'
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_ttbarwjets_lepprongs.yaml
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/03_05_ak8_ttbarwjets-lepprongs/03_05_ak8_ttbarwjets-lepprongs_best_epoch_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/log_lnuqq.txt) && 
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/ttbar.root
          --odir /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/ttbar/
          --signals hww_ele_lm,hww_mu_lm,hww_tau_lm,hww_ele_ls,hww_mu_ls,hww_tau_ls
          --bkgs ttbar_l,ttbar_l,ttbar_l,ttbar_l,ttbar_l,ttbar_l
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/bulkg.root,/hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/hwwlnuqq.root
          --isignames BulkGSMHiggs,SMHiggs
          --ptrange 300-400
          | tee -a /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/log_ttbarplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/ttbar.root
          --odir /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/ttbar_lepmerged/
          --signals hww_ele_lm,hww_mu_lm,hww_tau_lm,hww_ele_ls,hww_mu_ls,hww_tau_ls
          --bkgs top_lm,top_lm,top_lm,top_lm,top_lm,top_lm
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/bulkg.root,/hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/hwwlnuqq.root
          --isignames BulkGSMHiggs,SMHiggs
          --ptrange 300-400
          | tee -a /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/log_ttbarplotlepmerged.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/ttbar.root
          --odir /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/ttbar_lepsplit/
          --signals hww_ele_lm,hww_mu_lm,hww_tau_lm,hww_ele_ls,hww_mu_ls,hww_tau_ls
          --bkgs top_ls,top_ls,top_ls,top_ls,top_ls,top_ls
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/bulkg.root,/hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/hwwlnuqq.root
          --isignames BulkGSMHiggs,SMHiggs
          --ptrange 300-400
          | tee -a /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/log_ttbarplotlepsplit.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/wjets.root
          --odir /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/wjets_lepmerged/
          --signals hww_ele_lm,hww_mu_lm,hww_tau_lm,hww_ele_ls,hww_mu_ls,hww_tau_ls
          --bkgs wjets_lm,wjets_lm,wjets_lm,wjets_lm,wjets_lm,wjets_lm
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/bulkg.root,/hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/hwwlnuqq.root
          --isignames BulkGSMHiggs,SMHiggs
          --ptrange 300-400
          | tee -a /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/log_wjets_lepmergedplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/wjets.root
          --odir /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/wjets_lepsplit/
          --signals hww_ele_lm,hww_mu_lm,hww_tau_lm,hww_ele_ls,hww_mu_ls,hww_tau_ls
          --bkgs wjets_ls,wjets_ls,wjets_ls,wjets_ls,wjets_ls,wjets_ls
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/bulkg.root,/hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/hwwlnuqq.root
          --isignames BulkGSMHiggs,SMHiggs
          --ptrange 300-400
          | tee -a /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/log_wjets_lepsplitplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/wjets.root
          --odir /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/wjets/
          --signals hww_ele_lm,hww_mu_lm,hww_tau_lm,hww_ele_ls,hww_mu_ls,hww_tau_ls
          --bkgs wjets_l,wjets_l,wjets_l,wjets_l,wjets_l,wjets_l
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/bulkg.root,/hwwtaggervol/inferences/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/hwwlnuqq.root
          --isignames BulkGSMHiggs,SMHiggs
          --ptrange 300-400
          | tee -a /hwwtaggervol/plots/mq/12jul-1lepvttbarwjets-lepprongs-pt300to400/log_wjetsplot.txt)
        volumeMounts:
        - mountPath: /hwwtaggervol
          name: hwwtaggervol
        - name: git-repo
          mountPath: /opt/repo
        resources:
          limits:
            memory: 40Gi
            cpu: "8"
            nvidia.com/gpu: "2"
          requests:
            memory: 32Gi
            cpu: "6"
            nvidia.com/gpu: "2"
      initContainers:
      - name: init-clone-repo
        image: alpine/git
        args:
          - clone
          - --single-branch
          - https://github.com/quinnanm/weaver
          - /opt/repo/weaver
        volumeMounts:
          - name: git-repo
            mountPath: /opt/repo
      volumes:
      - name: git-repo
        emptyDir: {}
      - name: hwwtaggervol
        persistentVolumeClaim:
          claimName: hwwtaggervol
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-GeForce-GTX-1080
                - NVIDIA-GeForce-GTX-1080-Ti
                - NVIDIA-GeForce-GTX-2080-Ti
      restartPolicy: Never
  backoffLimit: 0