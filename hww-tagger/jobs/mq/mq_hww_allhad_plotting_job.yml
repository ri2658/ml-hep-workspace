apiVersion: batch/v1
kind: Job
metadata:
  name: mqhwwinference-ak8-11may-allhad
  labels:
    app: weavertagger
spec:
  template:
    spec:
      containers:
      - name: container
        image: gitlab-registry.nrp-nautilus.io/raghsthebest/hww-tagger:latest
        command:
        - "/bin/bash"
        - "-c"
        - >
          git -C /hwwtaggervol/melissa-weaver pull &&
          mkdir -p /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets &&
          mkdir -p /hwwtaggervol/plots/mq/11may-0lepvttbarwjets &&
          cd /opt/repo/weaver &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/ttbar.root
          --data-test "/hwwtaggervol/training/ak8_Apr14/test//TTTo*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/new_ntuples_Mar29/4q3q_flat_eta_genHm_pt300_cw_5_5_noqcdlep_abseta_pt_1500_qcd_oneweight.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/rk/04_18_ak8_qcd_oneweight/04_18_ak8_qcd_oneweight_best_epoch_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/log_ttbar.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/wjets.root
          --data-test "/hwwtaggervol/training/ak8_Apr14/test//WJetsTo*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/new_ntuples_Mar29/4q3q_flat_eta_genHm_pt300_cw_5_5_noqcdlep_abseta_pt_1500_qcd_oneweight.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/rk/04_18_ak8_qcd_oneweight/04_18_ak8_qcd_oneweight_best_epoch_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/log_wjets.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/qcd.root
          --data-test "/hwwtaggervol/training/ak8_Apr14/test//QCD*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/new_ntuples_Mar29/4q3q_flat_eta_genHm_pt300_cw_5_5_noqcdlep_abseta_pt_1500_qcd_oneweight.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/rk/04_18_ak8_qcd_oneweight/04_18_ak8_qcd_oneweight_best_epoch_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/log_qcd.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/bulkg.root
          --data-test '/hwwtaggervol/training/ak8_Apr14/test/Bulk*/*.root'
          --data-config /hwwtaggervol/melissa-weaver/data/new_ntuples_Mar29/4q3q_flat_eta_genHm_pt300_cw_5_5_noqcdlep_abseta_pt_1500_qcd_oneweight.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/rk/04_18_ak8_qcd_oneweight/04_18_ak8_qcd_oneweight_best_epoch_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/log_bulkg.txt) && 
          pip install coffea mplhep --upgrade &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/hwwlnuqq.root
          --data-test '/hwwtaggervol/training/ak8_Apr14/test/GluGluHToWWToLNuQQ*/*.root'
          --data-config /hwwtaggervol/melissa-weaver/data/new_ntuples_Mar29/4q3q_flat_eta_genHm_pt300_cw_5_5_noqcdlep_abseta_pt_1500_qcd_oneweight.yaml
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/rk/04_18_ak8_qcd_oneweight/04_18_ak8_qcd_oneweight_best_epoch_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/log_lnuqq.txt) && 
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/qcd.root
          --odir /hwwtaggervol/plots/mq/11may-0lepvttbarwjets/qcd/
          --signals hww_4q_merged,hww_3q_merged
          --bkgs qcdnolep,qcdnolep
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/bulkg.root
          --isignames BulkGSMHiggs
          | tee -a /hwwtaggervol/plots/mq/11may-0lepvttbarwjets/log_qcdplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/wjets.root
          --odir /hwwtaggervol/plots/mq/11may-0lepvttbarwjets/wjets/
          --signals hww_4q_merged,hww_3q_merged
          --bkgs w_asqcd,w_asqcd
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/bulkg.root
          --isignames BulkGSMHiggs
          | tee -a /hwwtaggervol/plots/mq/11may-0lepvttbarwjets/log_wjetsplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/ttbar.root
          --odir /hwwtaggervol/plots/mq/11may-0lepvttbarwjets/ttbar/
          --signals hww_4q_merged,hww_3q_merged
          --bkgs top_asqcd,top_asqcd
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/11may-0lepvttbarwjets/bulkg.root
          --isignames BulkGSMHiggs
          | tee -a /hwwtaggervol/plots/mq/11may-0lepvttbarwjets/log_ttbarplot.txt) &&
          (python -u plots/plot_losses.py
          --model-path /hwwtaggervol/models/rk/04_18_ak8_qcd_oneweight
          --output /hwwtaggervol/plots/mq/11may-0lepvttbarwjets/losses.png
          | tee -a /hwwtaggervol/plots/mq/11may-0lepvttbarwjets/losslog.txt)
        volumeMounts:
        - mountPath: /hwwtaggervol
          name: hwwtaggervol
        - name: git-repo
          mountPath: /opt/repo
        resources:
          limits:
            memory: 40Gi
            cpu: "8"
            nvidia.com/gpu: "2"
          requests:
            memory: 32Gi
            cpu: "6"
            nvidia.com/gpu: "2"
      initContainers:
      - name: init-clone-repo
        image: alpine/git
        args:
          - clone
          - --single-branch
          - https://github.com/quinnanm/weaver
          - /opt/repo/weaver
        volumeMounts:
          - name: git-repo
            mountPath: /opt/repo
      volumes:
      - name: git-repo
        emptyDir: {}
      - name: hwwtaggervol
        persistentVolumeClaim:
          claimName: hwwtaggervol
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-GeForce-GTX-1080
                - NVIDIA-GeForce-GTX-1080-Ti
                - NVIDIA-GeForce-GTX-2080-Ti
      restartPolicy: Never
  backoffLimit: 0