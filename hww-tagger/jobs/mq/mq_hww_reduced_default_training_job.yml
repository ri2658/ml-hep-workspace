apiVersion: batch/v1
kind: Job
metadata:
  name: mqhwwtrain-ak8-19aug-semilep-reduced-default
  labels:
    app: weavertagger
spec:
  template:
    spec:
      containers:
      - name: container
        image: gitlab-registry.nrp-nautilus.io/raghsthebest/hww-tagger:latest
        command:
        - "/bin/bash"
        - "-c"
        - >
          git -C /hwwtaggervol/melissa-weaver pull &&
          mkdir -p /hwwtaggervol/models/mq/19aug22-ak8-semilep-reduced-default/ &&
          cd /opt/repo/weaver &&
          (python -u -W ignore train.py
          --data-train "/hwwtaggervol/training/AK8_Jul21/train/TTToSemi*/*.root" "/hwwtaggervol/training/AK8_Jul21/train/WJetsTo*/*.root" "/hwwtaggervol/training/AK8_Jul21/train/QCD*/*0.root" "/hwwtaggervol/training/AK8_Jul21/train/QCD*/*1.root" "/hwwtaggervol/training/AK8_Jul21/train/QCD*/*2.root" "/hwwtaggervol/training/AK8_Jul21/train/QCD*/*3.root" "/hwwtaggervol/training/AK8_Jul21/train/QCD*/*4.root" "/hwwtaggervol/training/AK8_Jul21/train/QCD*/*5.root" "/hwwtaggervol/training/AK8_Jul21/train/QCD*/*6.root" "/hwwtaggervol/training/AK8_Jul21/train/QCD*/*9.root" "/hwwtaggervol/training/AK8_Jul21/train/JHUV*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_moddefault.yaml
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/19aug22-ak8-semilep-reduced-default/19aug22-ak8-semilep-reduced-default
          --num-workers 12
          --batch-size 256
          --num-epochs 32
          --start-lr 3e-3
          --optimizer ranger
          --gpu "0,1"
          --fetch-step 0.02
          | tee /hwwtaggervol/models/mq/19aug22-ak8-semilep-reduced-default/log.txt)
        volumeMounts:
        - mountPath: /hwwtaggervol
          name: hwwtaggervol
        - name: git-repo
          mountPath: /opt/repo
        resources:
          limits:
            memory: 140Gi
            cpu: "8"
            nvidia.com/gpu: "2"
          requests:
            memory: 128Gi
            cpu: "6"
            nvidia.com/gpu: "2"
      initContainers:
      - name: init-clone-repo
        image: alpine/git
        args:
          - clone
          - --single-branch
          - https://github.com/quinnanm/weaver
          - /opt/repo/weaver
        volumeMounts:
          - name: git-repo
            mountPath: /opt/repo
      volumes:
      - name: git-repo
        emptyDir: {}
      - name: hwwtaggervol
        persistentVolumeClaim:
          claimName: hwwtaggervol
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-GeForce-GTX-1080
                - NVIDIA-GeForce-GTX-1080-Ti
                - NVIDIA-GeForce-GTX-2080-Ti
      restartPolicy: Never
  backoffLimit: 0