apiVersion: batch/v1
kind: Job
metadata:
  name: mqhwwinference-ak8-9may-ttbar
  labels:
    app: weavertagger
spec:
  template:
    spec:
      containers:
      - name: container
        image: gitlab-registry.nrp-nautilus.io/raghsthebest/hww-tagger:latest
        command:
        - "/bin/bash"
        - "-c"
        - >
          git -C /hwwtaggervol/melissa-weaver pull &&
          mkdir -p /hwwtaggervol/inferences/mq/9may-1lepvttbar &&
          mkdir -p /hwwtaggervol/plots/mq/9may-1lepvttbar &&
          mkdir -p /hwwtaggervol/models/mq/9may-1lepvttbar &&
          cd /opt/repo/weaver &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/9may-1lepvttbar/ttbar.root
          --data-test "/hwwtaggervol/training/ak8_Apr14/test//TTTo*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_ttbar.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/05_09_ak8_ttbar/05_03_ak8_epoch-9_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/9may-1lepvttbar/log_ttbar.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/9may-1lepvttbar/wjets.root
          --data-test "/hwwtaggervol/training/ak8_Apr14/test//WJetsTo*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_ttbar.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/05_09_ak8_ttbar/05_03_ak8_epoch-9_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/9may-1lepvttbar/log_wjets.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/9may-1lepvttbar/qcd.root
          --data-test "/hwwtaggervol/training/ak8_Apr14/test//QCD*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_ttbar.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/05_09_ak8_ttbar/05_03_ak8_epoch-9_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/9may-1lepvttbar/log_qcd.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/9may-1lepvttbar/bulkg.root
          --data-test '/hwwtaggervol/training/ak8_Apr14/test/Bulk*/*.root'
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_ttbar.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/05_09_ak8_ttbar/05_03_ak8_epoch-9_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/9may-1lepvttbar/log_bulkg.txt) && 
          pip install coffea mplhep --upgrade &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/9may-1lepvttbar/hwwlnuqq.root
          --data-test '/hwwtaggervol/training/ak8_Apr14/test/GluGluHToWWToLNuQQ*/*.root'
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_ttbar.yaml
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/05_09_ak8_ttbar/05_03_ak8_epoch-9_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/9may-1lepvttbar/log_lnuqq.txt) && 
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/9may-1lepvttbar/wjets.root
          --odir /hwwtaggervol/plots/mq/9may-1lepvttbar/wjets/
          --signals hww_ele,hww_mu,hww_tau
          --bkgs w_asttbar,w_asttbar,w_asttbar
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/9may-1lepvttbar/bulkg.root,/hwwtaggervol/inferences/mq/9may-1lepvttbar/hwwlnuqq.root
          --isignames BulkGSMHiggs,SMHiggs
          | tee -a /hwwtaggervol/plots/mq/9may-1lepvttbar/log_wjetsplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/9may-1lepvttbar/qcd.root
          --odir /hwwtaggervol/plots/mq/9may-1lepvttbar/qcd/
          --signals hww_ele,hww_mu,hww_tau
          --bkgs qcd_asttbar,qcd_asttbar,qcd_asttbar
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/9may-1lepvttbar/bulkg.root,/hwwtaggervol/inferences/mq/9may-1lepvttbar/hwwlnuqq.root
          --isignames BulkGSMHiggs,SMHiggs
          | tee -a /hwwtaggervol/plots/mq/9may-1lepvttbar/log_qcdplot.txt) &&
          (python -u plots/plot_losses.py
          --model-path /hwwtaggervol/models/mq/05_09_ak8_ttbar/05_03_ak8
          --output /hwwtaggervol/plots/mq/9may-1lepvttbar/losses.png
          | tee -a /hwwtaggervol/plots/mq/9may-1lepvttbar/log.txt)
        volumeMounts:
        - mountPath: /hwwtaggervol
          name: hwwtaggervol
        - name: git-repo
          mountPath: /opt/repo
        resources:
          limits:
            memory: 40Gi
            cpu: "8"
            nvidia.com/gpu: "2"
          requests:
            memory: 32Gi
            cpu: "6"
            nvidia.com/gpu: "2"
      initContainers:
      - name: init-clone-repo
        image: alpine/git
        args:
          - clone
          - --single-branch
          - https://github.com/quinnanm/weaver
          - /opt/repo/weaver
        volumeMounts:
          - name: git-repo
            mountPath: /opt/repo
      volumes:
      - name: git-repo
        emptyDir: {}
      - name: hwwtaggervol
        persistentVolumeClaim:
          claimName: hwwtaggervol
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-GeForce-GTX-1080
                - NVIDIA-GeForce-GTX-1080-Ti
                - NVIDIA-GeForce-GTX-2080-Ti
      restartPolicy: Never
  backoffLimit: 0