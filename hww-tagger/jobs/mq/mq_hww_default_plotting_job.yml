apiVersion: batch/v1
kind: Job
metadata:
  name: mqhwwinference-21sep22-ak8-semilep-default
  labels:
    app: weavertagger
spec:
  template:
    spec:
      containers:
      - name: container
        image: gitlab-registry.nrp-nautilus.io/raghsthebest/hww-tagger:latest
        command:
        - "/bin/bash"
        - "-c"
        - >
          git -C /hwwtaggervol/melissa-weaver pull &&
          mkdir -p /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default &&
          mkdir -p /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default &&
          mkdir -p /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/wjets &&
          mkdir -p /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/ttbar &&
          mkdir -p /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/qcd &&
          cd /opt/repo/weaver &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/ttbar.root
          --data-test "/hwwtaggervol/training/AK8_Sep16/test/TTTo*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_moddefault.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/21sep22-ak8-semilep-default/21sep22-ak8-semilep-default_epoch-18_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/log_ttbar.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/qcd.root
          --data-test "/hwwtaggervol/training/AK8_Sep16/test/QCD*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_moddefault.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/21sep22-ak8-semilep-default/21sep22-ak8-semilep-default_epoch-18_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/log_qcd.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/wjets.root
          --data-test "/hwwtaggervol/training/AK8_Sep16/test/WJetsTo*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_moddefault.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/21sep22-ak8-semilep-default/21sep22-ak8-semilep-default_epoch-18_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/log_wjets.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/jhu.root
          --data-test "/hwwtaggervol/training/AK8_Sep16/test/JHUV*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_moddefault.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/21sep22-ak8-semilep-default/21sep22-ak8-semilep-default_epoch-18_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/log_jhu.txt) &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/hwwlnuqq.root
          --data-test "/hwwtaggervol/training/AK8_Sep16/test/GluGluHToWW*/*.root"
          --data-config /hwwtaggervol/melissa-weaver/data/mq_ntuples/melissa_dataconfig_semilep_moddefault.yaml 
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/mq/21sep22-ak8-semilep-default/21sep22-ak8-semilep-default_epoch-18_state.pt
          --gpus "0,1"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 2
          | tee -a /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/log_lnuqq.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/ttbar.root
          --odir /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/ttbar/
          --signals hww_ele,hww_mu,hww_tau_el,hww_tau_mu,hww_tau_had
          --bkgs ttbar_l,ttbar_l,ttbar_l,ttbar_l,ttbar_l
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/jhu.root
          --isignames SMHiggs
          | tee -a /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/log_ttbarplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/ttbar.root
          --odir /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/ttbar_lm/
          --signals hww_ele,hww_mu,hww_tau_el,hww_tau_mu,hww_tau_had
          --bkgs ttbar_lm,ttbar_lm,ttbar_lm,ttbar_lm,ttbar_lm
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/jhu.root
          --isignames SMHiggs
          | tee -a /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/log_ttbarlmplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/ttbar.root
          --odir /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/ttbar_ls/
          --signals hww_ele,hww_mu,hww_tau_el,hww_tau_mu,hww_tau_had
          --bkgs ttbar_ls,ttbar_ls,ttbar_ls,ttbar_ls,ttbar_ls
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/jhu.root
          --isignames SMHiggs
          | tee -a /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/log_ttbarlsplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/wjets.root
          --odir /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/wjets/
          --signals hww_ele,hww_mu,hww_tau_el,hww_tau_mu,hww_tau_had
          --bkgs wjets_l,wjets_l,wjets_l,wjets_l,wjets_l
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/jhu.root
          --isignames SMHiggs
          | tee -a /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/log_wjetsplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/wjets.root
          --odir /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/wjets_lm/
          --signals hww_ele,hww_mu,hww_tau_el,hww_tau_mu,hww_tau_had
          --bkgs wjets_lm,wjets_lm,wjets_lm,wjets_lm,wjets_lm
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/jhu.root
          --isignames SMHiggs
          | tee -a /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/log_wjetslmplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/wjets.root
          --odir /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/wjets_ls/
          --signals hww_ele,hww_mu,hww_tau_el,hww_tau_mu,hww_tau_had
          --bkgs wjets_ls,wjets_ls,wjets_ls,wjets_ls,wjets_ls
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/jhu.root
          --isignames SMHiggs
          | tee -a /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/log_wjetslsplot.txt) &&
          (python -u plots/plot_classification_fromoutput.py
          --name ParticleNet-PyG-EF
          --ifile /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/qcd.root
          --odir /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/qcd/
          --signals hww_ele,hww_mu,hww_tau_el,hww_tau_mu,hww_tau_had
          --bkgs qcd1lep,qcd1lep,qcd1lep,qcd1lep,qcd1lep
          --mbranch fj_genRes_mass
          --jet AK8
          -v
          --isig /hwwtaggervol/inferences/mq/21sep22-ak8-semilep-default/jhu.root
          --isignames SMHiggs
          | tee -a /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/log_qcdplot.txt) &&
          (python -u plots/plot_losses.py
          --model-path /hwwtaggervol/models/mq/21sep22-ak8-semilep-default/21sep22-ak8-semilep-default
          --output /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/losses.png
          | tee -a /hwwtaggervol/plots/mq/21sep22-ak8-semilep-default/losslog.txt)
        volumeMounts:
        - mountPath: /hwwtaggervol
          name: hwwtaggervol
        - name: git-repo
          mountPath: /opt/repo
        resources:
          limits:
            memory: 40Gi
            cpu: "8"
            nvidia.com/gpu: "2"
          requests:
            memory: 32Gi
            cpu: "6"
            nvidia.com/gpu: "2"
      initContainers:
      - name: init-clone-repo
        image: alpine/git
        args:
          - clone
          - --single-branch
          - https://github.com/quinnanm/weaver
          - /opt/repo/weaver
        volumeMounts:
          - name: git-repo
            mountPath: /opt/repo
      volumes:
      - name: git-repo
        emptyDir: {}
      - name: hwwtaggervol
        persistentVolumeClaim:
          claimName: hwwtaggervol
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-GeForce-GTX-1080
                - NVIDIA-GeForce-GTX-1080-Ti
                - NVIDIA-GeForce-GTX-2080-Ti
      restartPolicy: Never
  backoffLimit: 0