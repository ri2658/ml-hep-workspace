apiVersion: batch/v1
kind: Job
metadata:
  name: weaver-job-rk-03-29-qcdall
  labels:
    app: weavertagger
spec:
  template:
    spec:
      containers:
      - name: container
        image: gitlab-registry.nrp-nautilus.io/raghsthebest/hww-tagger:latest
        command:
        - "/bin/bash"
        - "-c"
        - >
          git -C /hwwtaggervol/weaver pull &&
          mkdir -p /hwwtaggervol/models/rk/03_29_qcdall/ &&
          cd /opt/repo/weaver &&
          (python -u -W ignore train.py
          --data-train "/hwwtaggervol/training/ak15_Mar15/train//QCD*/*.root" "/hwwtaggervol/training/ak15_Mar15/train//BulkGraviton*/*.root"
          --data-config /hwwtaggervol/weaver/data/new_ntuples//ak15_4q3q_flat_eta_genHm_pt300_qcdall.yaml
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/rk/03_29_qcdall/03_29_qcdall
          --num-workers 12
          --batch-size 256
          --num-epochs 32
          --start-lr 3e-3
          --optimizer ranger
          --gpu "0,1"
          --fetch-step 0.02
          | tee /hwwtaggervol/models/rk/03_29_qcdall/log.txt)
        volumeMounts:
        - mountPath: /hwwtaggervol
          name: hwwtaggervol
        - name: git-repo
          mountPath: /opt/repo
        resources:
          limits:
            memory: 140Gi
            cpu: "8"
            nvidia.com/gpu: "2"
          requests:
            memory: 128Gi
            cpu: "6"
            nvidia.com/gpu: "2"
      initContainers:
      - name: init-clone-repo
        image: alpine/git
        args:
          - clone
          - --single-branch
          - https://github.com/rkansal47/weaver
          - /opt/repo/weaver
        volumeMounts:
          - name: git-repo
            mountPath: /opt/repo
      volumes:
      - name: git-repo
        emptyDir: {}
      - name: hwwtaggervol
        persistentVolumeClaim:
          claimName: hwwtaggervol
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-GeForce-GTX-1080
                - NVIDIA-GeForce-GTX-1080-Ti
                - NVIDIA-GeForce-GTX-2080-Ti
      restartPolicy: Never
  backoffLimit: 0
