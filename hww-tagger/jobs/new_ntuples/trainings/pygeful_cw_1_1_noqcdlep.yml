apiVersion: batch/v1
kind: Job
metadata:
  name: weaver-job-rk-ul-pyg-ef-cw-1-1-noqcdlep
  labels:
    app: weavertagger
spec:
  template:
    spec:
      containers:
      - name: container
        image: gitlab-registry.nrp-nautilus.io/raghsthebest/hww-tagger:latest
        command:
        - "/bin/bash"
        - "-c"
        - >
          git clone https://github.com/rkansal47/weaver &&
          cd weaver &&
          mkdir -p /hwwtaggervol/models/rk/03_17_pyg_ef_nn_cw_1_1_noqcdlep &&
          (python -u -W ignore train.py
          --data-train '/hwwtaggervol/training/ak15_Mar15/train/QCD*/*.root'
          '/hwwtaggervol/training/ak15_Mar15/train/BulkGraviton*/*.root'
          --data-config data/new_ntuples/ak15_4q3q_flat_eta_genHm_pt300_cw_1_1_noqcdlep.yaml
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/rk/03_17_pyg_ef_nn_cw_1_1_noqcdlep/03_17_pyg_ef_nn_cw_1_1_noqcdlep
          --num-workers 12
          --batch-size 256
          --num-epochs 32
          --start-lr 3e-3
          --optimizer ranger
          --gpu "0,1"
          --fetch-step 0.02
          | tee /hwwtaggervol/logs/rk/03_17_pyg_ef_nn_cw_1_1_noqcdlep.txt &
          wait)
        volumeMounts:
        - mountPath: /hwwtaggervol
          name: hwwtaggervol
        resources:
          limits:
            memory: 140Gi
            cpu: "8"
            nvidia.com/gpu: "2"
          requests:
            memory: 128Gi
            cpu: "6"
            nvidia.com/gpu: "2"
      volumes:
      - name: hwwtaggervol
        persistentVolumeClaim:
          claimName: hwwtaggervol
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: nvidia.com/gpu.product
                operator: In
                values:
                - NVIDIA-GeForce-GTX-1080
                - NVIDIA-GeForce-GTX-1080-Ti
                - NVIDIA-GeForce-GTX-2080-Ti
      restartPolicy: Never
  backoffLimit: 0
