apiVersion: batch/v1
kind: Job
metadata:
  name: weaver-job-rk-ul-pyg-ef-cw-8-2-1500
  labels:
    app: weavertagger
spec:
  template:
    spec:
      containers:
      - name: container
        image: gitlab-registry.nrp-nautilus.io/raghsthebest/hww-tagger:latest
        command:
        - "/bin/bash"
        - "-c"
        - >
          git clone https://github.com/rkansal47/weaver &&
          cd weaver &&
          mkdir -p /hwwtaggervol/models/rk/02_23_pyg_ef_ul_cw_8_2 &&
          (python -u train.py
          --data-train '/hwwtaggervol/training/ak15_Feb14/train/QCD*/*.root'
          '/hwwtaggervol/training/ak15_Feb14/train/BulkGraviton*/*.root'
          --data-config data/rk/ak15_4q3q_flat_eta_genHm_pt300_cw_8_2_1500_cut.yaml
          --network-config networks/particle_net_pf_sv_4_layers_pyg_ef.py
          --model-prefix /hwwtaggervol/models/rk/02_23_pyg_ef_ul_cw_8_2/pyg_ef_ul
          --num-workers 12
          --batch-size 256
          --num-epochs 32
          --start-lr 3e-3
          --optimizer ranger
          --gpu "0,1"
          --fetch-step 0.02
          | tee /hwwtaggervol/logs/rk/02_23_pyg_ef_ul_cw_8_2.txt &
          wait)
        volumeMounts:
        - mountPath: /hwwtaggervol
          name: hwwtaggervol
        resources:
          limits:
            memory: 140Gi
            cpu: "8"
            nvidia.com/gpu: "2"
          requests:
            memory: 128Gi
            cpu: "6"
            nvidia.com/gpu: "2"
      volumes:
      - name: hwwtaggervol
        persistentVolumeClaim:
          claimName: hwwtaggervol
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: gpu-type
                operator: In
                values:
                - "1080"
                - 1080Ti
                - 2080Ti
      restartPolicy: Never
  backoffLimit: 0
