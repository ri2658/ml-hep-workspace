apiVersion: batch/v1
kind: Job
metadata:
  name: weaver-job-rk-ul-pnet-4-layers-inference
  labels:
    app: weavertagger
spec:
  template:
    spec:
      containers:
      - name: container
        image: gitlab-registry.nrp-nautilus.io/raghsthebest/hww-tagger:latest
        command:
        - "/bin/bash"
        - "-c"
        - >
          git clone https://github.com/rkansal47/weaver &&
          cd weaver &&
          mkdir -p /hwwtaggervol/inferences/rk /hwwtaggervol/logs/rk/inferences &&
          (python -u train.py
          --predict
          --predict-output /hwwtaggervol/inferences/rk/02_23_pnet_4_layers.root
          --data-test '/hwwtaggervol/training/ak15_Feb14/test/QCD*/*.root'
          '/hwwtaggervol/training/ak15_Feb14/test/*HHTo4W_JHUGen*/*.root'
          --data-config data/rk/ak15_4q3q_flat_eta_genHm_pt300.yaml
          --network-config networks/particle_net_pf_sv_4_layers.py
          --model-prefix /hwwtaggervol/models/rk/02_23_pnet_4_layers/pnet_4_layers_best_epoch_state.pt
          --gpus "0"
          --batch-size 256
          --fetch-step 0.02
          --num-workers 8
          | tee /hwwtaggervol/logs/rk/inferences/02_23_pnet_4_layers.txt) &&
          pip install coffea mplhep --upgrade && mkdir -p /hwwtaggervol/plots/rk/02_23_pnet_4_layers/ &&
          (python -u plot_classification_fromoutput.py
          --name "02_23_pnet_4_layers"
          --ifile /hwwtaggervol/inferences/rk/02_23_pnet_4_layers.root
          --odir /hwwtaggervol/plots/rk/02_23_pnet_4_layers/
          --signals hww_4q_merged,hww_3q_merged
          --bkgs qcd,qcd
          --mbranch fj_genRes_mass
          | tee /hwwtaggervol/plots/rk/02_23_pnet_4_layers/log.txt &
          wait)
        volumeMounts:
        - mountPath: /hwwtaggervol
          name: hwwtaggervol
        resources:
          limits:
            memory: 40Gi
            cpu: "8"
            nvidia.com/gpu: "2"
          requests:
            memory: 32Gi
            cpu: "6"
            nvidia.com/gpu: "2"
      volumes:
      - name: hwwtaggervol
        persistentVolumeClaim:
          claimName: hwwtaggervol
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - key: gpu-type
                operator: In
                values:
                - "1080"
                - 1080Ti
                - 2080Ti
      restartPolicy: Never
  backoffLimit: 0
